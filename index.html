<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnología del control / 3ro DyCP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
         html { scroll-behavior: smooth; }
        body {
          font-family: 'DM Sans', sans-serif;
          background: var(--bg);
          color: var(--text);
          line-height: 1.6;
          overflow-x: hidden;
        }    
        .hero {
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            max-width: 400px;
        }
        .button {
            background-color: teal; 
            color: white; 
            padding: 15px 20px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background-color 0.3s;
            font-family: 'DM Sans', sans-serif;
        }
        .button:hover {
            background-color: coral;
        }
        .button.secondary {
            background-color: amber; /* If a second button is needed */
        }
        .button.secondary:hover {
            background-color: coral;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Tecnología del control / 3ro DyCP 2026</h1>
        <a href="lazoAbierto.html"><button class="button">Sistemas de lazo abierto</button></a>
        <a href="ejemplos_sistemas_control.html"><button class="button secondary">Ejemplos sistemas de control</button></a>
    </div>
