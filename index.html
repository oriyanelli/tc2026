<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecnología del Control | 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal:    #0F6E56; --teal-l:  #E1F5EE; --teal-m:  #1D9E75;
  --purple:  #534AB7; --purple-l:#EEEDFE; --purple-m:#7F77DD;
  --amber:   #BA7517; --amber-l: #FAEEDA; --amber-m: #EF9F27;
  --coral:   #993C1D; --coral-l: #FAECE7; --coral-m: #D85A30;
  --blue:    #185FA5; --blue-l:  #E6F1FB; --blue-m:  #378ADD;
  --green:   #3B6D11; --green-l: #EAF3DE; --green-m: #639922;
  --red:     #A32D2D; --red-l:   #FCEBEB; --red-m:   #E24B4A;
  --gray:    #5F5E5A; --gray-l:  #F1EFE8; --gray-m:  #888780;
  --dark:    #1c1b18;
  --text:    #2C2C2A;
  --muted:   #5F5E5A;
  --border:  #D3D1C7;
  --bg:      #FAFAF7;
  --white:   #ffffff;
  --radius:  10px;
  --shadow:  0 4px 24px rgba(0,0,0,.08);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── Nav ──────────────────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--dark);
  display: flex; align-items: center; gap: 0;
  padding: 0 32px;
  box-shadow: 0 2px 16px rgba(0,0,0,.25);
}
.nav-brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 15px;
  color: #fff; letter-spacing: -.3px;
  padding: 16px 24px 16px 0;
  border-right: 1px solid rgba(255,255,255,.12);
  margin-right: 16px;
  white-space: nowrap;
}
.nav-links { display: flex; gap: 0; flex: 1; }
.nav-links a {
  color: rgba(255,255,255,.6);
  text-decoration: none;
  font-size: 13px; font-weight: 500;
  padding: 18px 16px;
  transition: color .2s, background .2s;
  border-bottom: 2px solid transparent;
}
.nav-links a:hover { color: #fff; }
.nav-links a.active { color: #fff; border-bottom-color: var(--teal-m); }
.nav-pill {
  margin-left: auto;
  background: var(--teal); color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px;
  letter-spacing: .5px;
}

/* ── Hero section ─────────────────────────────────────────── */
#seccion-1 {
  min-height: 100vh;
  background: var(--dark);
  display: grid; grid-template-rows: auto 1fr;
  position: relative; overflow: hidden;
}
.hero-decor {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 70% 40%, rgba(29,158,117,.12) 0%, transparent 70%),
              radial-gradient(ellipse 40% 60% at 20% 80%, rgba(83,74,183,.1) 0%, transparent 60%);
}
.hero-inner {
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 64px;
  gap: 40px;
  position: relative; z-index: 1;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--teal-m); text-transform: uppercase;
}
.hero-eyebrow span { width: 24px; height: 1px; background: var(--teal-m); display: block; }
h1.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(36px, 6vw, 68px);
  font-weight: 800; line-height: 1.05;
  color: #fff; letter-spacing: -2px;
}
h1.hero-title em { font-style: normal; color: var(--teal-m); }
.hero-sub {
  font-size: 16px; color: rgba(255,255,255,.55);
  max-width: 520px; font-weight: 300; line-height: 1.7;
}
.hero-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; max-width: 680px;
}
.hero-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: background .2s, border-color .2s, transform .15s;
  text-decoration: none;
}
.hero-card:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); transform: translateY(-2px); }
.hero-card-num { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--gray-m); margin-bottom: 8px; }
.hero-card-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.hero-card-desc { font-size: 12px; color: rgba(255,255,255,.45); }

/* ── Section wrapper ──────────────────────────────────────── */
.section {
  padding: 100px 64px;
  min-height: 100vh;
  position: relative;
}
.section-header {
  margin-bottom: 56px;
  display: flex; flex-direction: column; gap: 10px;
}
.section-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase;
}
.section-tag .dot { width: 6px; height: 6px; border-radius: 50%; }
h2.section-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800; letter-spacing: -1.5px;
  line-height: 1.1; color: var(--dark);
}
.section-desc { font-size: 15px; color: var(--muted); max-width: 560px; }

    
/* ── Responsive ───────────────────────────────────────────── */
@media (max-width: 768px) {
  .section { padding: 64px 24px; }
  .hero-inner { padding: 48px 24px; }
  nav { padding: 0 16px; }
  .nav-links a { padding: 16px 10px; font-size: 12px; }
  .concept-block { grid-template-columns: 1fr; }
  .example-panel.active { grid-template-columns: 1fr; }
  .side-panel { position: static; }
  footer { padding: 32px 24px; flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<!-- ── NAV ──────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-brand">Tecnología del Control</div>
  <span class="nav-pill">3° DYCP / 2026</span>
</nav>

  <div class="hero-decor"></div>
  <div class="hero-inner">
    <h1 class="hero-title">Hola,<em>bienvenidos</em></h1>
    <div class="hero-cards">
      <a href="lazoAbierto.html" class="hero-card">
        <div class="hero-card-num">01</div>
        <div class="hero-card-title">Sistemas de lazo abierto</div>
        <div class="hero-card-desc">Definición, conceptos y ejemplos</div>
      </a>
      <a href="#seccion-3" class="hero-card">
        <div class="hero-card-num">02</div>
        <div class="hero-card-title">Lazo cerrado</div>
           <div class="hero-card-desc">Definición, conceptos y ejemplos</div>
      </a>
      <a href="ejemplos.html" class="hero-card">
        <div class="hero-card-num">03</div>
        <div class="hero-card-title">Ejemplos</div>
        <div class="hero-card-desc">Tostadora, semáforo y lavadora</div>
      </a>
    </div>
  </div>
</section>
